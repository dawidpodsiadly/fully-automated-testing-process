apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: test-installation
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: {{ .Values.image }}
          ports:
            - containerPort: 3050