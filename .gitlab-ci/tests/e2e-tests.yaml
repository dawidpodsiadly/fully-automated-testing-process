e2e-tests:
  stage: tests
  image: mcr.microsoft.com/playwright:v1.44.0
  script:
    - echo "Running E2E tests"
    - cd tests/e2e
    - npm ci
    - npm run test:all
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: >-
        $RUN_E2E_TESTS == "true"
