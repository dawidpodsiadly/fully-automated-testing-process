apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: test-installation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.image }}
          ports:
            - containerPort: 27017
